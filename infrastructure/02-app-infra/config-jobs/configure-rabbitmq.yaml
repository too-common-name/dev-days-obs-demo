apiVersion: batch/v1
kind: Job
metadata:
  name: configure-rabbitmq
  annotations:
  labels:
    app.kubernetes.io/part-of: myreadings
    app.kubernetes.io/component: config
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: ansible-configurator
      restartPolicy: Never
      initContainers:
        - name: clone-repo
          image: alpine/git:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              git clone --depth 1 --branch ${GIT_BRANCH} ${GIT_REPO_URL} /workspace
          env:
            - name: GIT_REPO_URL
              value: "https://github.com/too-common-name/myreadings-gitops.git"
            - name: GIT_BRANCH
              value: "demo-single-cluster"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: ansible
          image: quay.io/rh-ee-drossi/myreadings-ee:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              cd /workspace/ansible && \
              ansible-playbook configure-rabbitmq.yml \
                -e "app_namespace=$APP_NAMESPACE" \
                -e "rabbitmq_vhost_name=my-readings" \
                -e "rabbitmq_application_user=myreadings-user" \
                -e "rabbitmq_application_password=myreadings-user" \
                -e "rabbitmq_queue=myreadings-queue" \
                -e "rabbitmq_routing_key=KK.EVENT.CLIENT.my-readings.SUCCESS.myreadings-client.REGISTER"
          env:
            - name: APP_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: workspace
          emptyDir: {}
