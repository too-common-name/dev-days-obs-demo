apiVersion: batch/v1
kind: Job
metadata:
  name: configure-keycloak
  annotations:
  labels:
    app.kubernetes.io/part-of: myreadings
    app.kubernetes.io/component: config
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: ansible-configurator
      restartPolicy: Never
      initContainers:
        - name: clone-repo
          image: alpine/git:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              git clone --depth 1 --branch ${GIT_BRANCH} ${GIT_REPO_URL} /workspace
          env:
            - name: GIT_REPO_URL
              value: "https://github.com/too-common-name/myreadings-gitops.git"
            - name: GIT_BRANCH
              value: "demo-single-cluster"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: ansible
          image: quay.io/rh-ee-drossi/myreadings-ee:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              cd /workspace/ansible && \
              ansible-playbook configure-keycloak.yml \
                -e "app_namespace=$APP_NAMESPACE" \
                -e "keycloak_realm_name=my-readings" \
                -e "keycloak_client=myreadings-client" \
                -e "keycloak_client_display_name=My Readings Application" \
                -e "keycloak_allow_registration=true" \
                -e "frontend_url=$FRONTEND_URL"
          env:
            - name: APP_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: myreadings-app-config
                  key: FRONTEND_URL
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: workspace
          emptyDir: {}
