apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: myreadings-db-anyuid
  annotations:
  labels:
    app.kubernetes.io/part-of: myreadings
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: myreadings-db-instance
  - kind: ServiceAccount
    name: myreadings-db-pgbackrest
  - kind: ServiceAccount
    name: myreadings-db-repohost
