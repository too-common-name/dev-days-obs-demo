apiVersion: v1
kind: ConfigMap
metadata:
  name: myreadings-db-init
  labels:
    app.kubernetes.io/part-of: myreadings
data:
  init.sql: |
    -- ============================================================
    -- books_db: schema + seed data
    -- ============================================================
    \c books_db

    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS books (
        book_id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        isbn VARCHAR(20) UNIQUE,
        title VARCHAR(255) NOT NULL,
        authors TEXT[],
        publication_date DATE,
        publisher VARCHAR(255),
        description TEXT,
        page_count INTEGER,
        cover_image_id VARCHAR(255),
        original_language VARCHAR(50),
        genre VARCHAR(100) CHECK (
            genre IN (
                'Fantasy','Science Fiction','Dystopian','Adventure','Romance',
                'Detective','Mystery','Horror','Thriller','Paranormal',
                'Historical Fiction','Contemporary','Memoir','Biography',
                'Autobiography','True Crime','Self Help','Health','Travel',
                'Guide','Families & Relationships','Humor','Children''s',
                'Poetry','Drama','Classics','Comics','Graphic Novel',
                'Short Story','Religion','Spirituality','Science','History',
                'Philosophy','Art','Cookbooks','Diaries','Journals','Essays',
                'Anthology','Western','Crime','War','Political','Technical Manual'
            )
        )
    );

