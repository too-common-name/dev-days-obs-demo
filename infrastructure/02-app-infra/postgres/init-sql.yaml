    -- ============================================================
    -- users_db: schema only (users are created via Keycloak registration)
    -- ============================================================
    \c users_db

    CREATE TABLE IF NOT EXISTS users (
        keycloak_user_id UUID PRIMARY KEY,
        first_name VARCHAR(50) NOT NULL,
        last_name VARCHAR(50) NOT NULL,
        username VARCHAR(80) NOT NULL UNIQUE,
        email VARCHAR(100) NOT NULL UNIQUE,
        theme_preference VARCHAR,
        genre_preference TEXT[]
    );

    -- ============================================================
    -- readinglist_db: schema only
    -- ============================================================
    \c readinglist_db

    CREATE TABLE IF NOT EXISTS reading_lists (
        id UUID PRIMARY KEY,
        user_id UUID NOT NULL,
        name VARCHAR(30) NOT NULL,
        description VARCHAR(200),
        creation_date TIMESTAMP WITHOUT TIME ZONE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS reading_list_items (
        reading_list_id UUID NOT NULL,
        book_id UUID NOT NULL,
        CONSTRAINT fk_reading_list
            FOREIGN KEY(reading_list_id) REFERENCES reading_lists(id)
            ON DELETE CASCADE,
        PRIMARY KEY (reading_list_id, book_id)
    );

    -- ============================================================
    -- review_db: schema only
    -- ============================================================
    \c review_db

    CREATE TABLE IF NOT EXISTS reviews (
        review_id UUID PRIMARY KEY,
        book_id UUID NOT NULL,
        user_id UUID NOT NULL,
        rating INT NOT NULL,
        review_text VARCHAR(200),
        publication_date TIMESTAMP WITHOUT TIME ZONE NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_reviews_book_id ON reviews(book_id);
    CREATE INDEX IF NOT EXISTS idx_reviews_user_id ON reviews(user_id);
