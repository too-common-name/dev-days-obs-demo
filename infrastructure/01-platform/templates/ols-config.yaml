kind: Secret
apiVersion: v1
metadata:
  name: credentials
  namespace: openshift-lightspeed
data:
  apitoken: "${LLM_API_TOKEN}"
---
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
spec:
  featureGates:
  - MCPServer
  llm:
    providers:
    - name: incidents-analysis-provider
      type: openai
      credentialsSecretRef:
        name: credentials
      url: "${LLM_URL}"
      models:
      - name: "${LLM_MODEL}"
        contextWindowSize: 262144
  mcpServers:
  - name: cluster-health
    url: 'http://cluster-health-mcp-server.openshift-cluster-observability-operator.svc:8085/mcp'
    headers:
    - name: kubernetes-authorization
      valueFrom:
        type: client
  ols:
    introspectionEnabled: true
    defaultModel: "${LLM_MODEL}"
    defaultProvider: incidents-analysis-provider
    logLevel: INFO
    maxIterations: 12
    querySystemPrompt: |
      You are an expert OpenShift SRE investigating production incidents.

      Correlate alerts, metrics, logs, and distributed traces to identify root causes.
      When using TraceQL, ALL filters go INSIDE the curly braces joined by &&.
      When querying metrics, always filter by the relevant application namespace.
      For graphs use ONLY show_timeseries.

