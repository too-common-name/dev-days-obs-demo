kind: Secret
apiVersion: v1
metadata:
  name: credentials
  namespace: openshift-lightspeed
data:
  apitoken: "${LLM_API_TOKEN}"
---
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
spec:
  featureGates:
  - MCPServer
  querySystemPrompt: |
    When the user asks to visualize metrics, plot data, or create charts,
    always use the show_timeseries tool instead of execute_range_query.
    When investigating incidents, use the get_incidents tool from the
    cluster-health MCP server.
  llm:
    providers:
    - name: incidents-analysis-provider
      type: openai
      credentialsSecretRef:
        name: credentials
      url: "${LLM_URL}"
      models:
      - name: "${LLM_MODEL}"
  mcpServers:
  - name: cluster-health
    url: 'http://cluster-health-mcp-server.openshift-cluster-observability-operator.svc:8085/mcp'
    headers:
    - name: kubernetes-authorization
      valueFrom:
        type: client
  ols:
    introspectionEnabled: true
    defaultModel: "${LLM_MODEL}"
    defaultProvider: incidents-analysis-provider
    logLevel: INFO