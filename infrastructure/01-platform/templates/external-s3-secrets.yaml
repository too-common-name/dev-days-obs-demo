# Fill in your S3 credentials and apply BEFORE running 'make deploy-platform'.
# Required only when USE_OBC=false (external S3 instead of ODF/NooBaa).
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-demo-loki-secret
  namespace: openshift-logging
type: Opaque
stringData:
  bucketnames: "<your-loki-bucket>"
  endpoint: "https://<your-s3-endpoint>"
  access_key_id: "<access-key>"
  access_key_secret: "<secret-key>"
  region: "<region>"
---
apiVersion: v1
kind: Secret
metadata:
  name: observability-demo-tempo-secret
  namespace: openshift-tracing
type: Opaque
stringData:
  bucket: "<your-tempo-bucket>"
  endpoint: "https://<your-s3-endpoint>"
  access_key_id: "<access-key>"
  access_key_secret: "<secret-key>"
