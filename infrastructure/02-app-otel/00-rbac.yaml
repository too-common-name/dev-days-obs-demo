apiVersion: v1
kind: ServiceAccount
metadata:
  name: myreadings-otel-collector
  namespace: myreadings-dev
---
# Tempo gateway: write traces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: myreadings-tempostack-traces-write
rules:
  - apiGroups: ['tempo.grafana.com']
    resources: ['platform']
    resourceNames: ['traces']
    verbs: ['create']
  - apiGroups: ['']
    resources: ['pods', 'namespaces']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['replicasets']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: myreadings-tempostack-traces-write-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: myreadings-tempostack-traces-write
subjects:
  - kind: ServiceAccount
    name: myreadings-otel-collector
    namespace: myreadings-dev
---
# Loki gateway: write application logs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: myreadings-loki-logs-writer
rules:
- apiGroups: [loki.grafana.com]
  resourceNames: [logs]
  resources: [application]
  verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: myreadings-loki-logs-writer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: myreadings-loki-logs-writer
subjects:
  - kind: ServiceAccount
    name: myreadings-otel-collector
    namespace: myreadings-dev
